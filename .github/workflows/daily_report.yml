name: 半量化交易訊號系統 (TW 18:00)

on:
  schedule:
    - cron: "0 10 * * 1-5"
  workflow_dispatch: {}

# 賦予 git push 權限（historical_signals.csv 每日自動 commit 回 repo）
permissions:
  contents: write

# 並發鎖：同一時間只允許一個 workflow 執行，重複觸發時取消舊的
# 防止手動重複觸發導致兩個機器人同時寫入同一個 CSV
concurrency:
  group: "semi-quant-report"
  cancel-in-progress: true

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 20   # 加入大盤資料抓取，預留更多時間

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      TZ: Asia/Taipei
      DAYS: "5"
      TOP_N: "10"
      DEBUG_HTML: "1"

      # ✅ 大盤籌碼抓取（1=啟用, 0=停用）
      MARKET_DATA: "1"
      MARKET_HISTORY_DAYS: "6"   # 抓取天數（含當天+前5天）

      # ✅ 半凱利資金控管 + 零股前導測試
      TOTAL_CAPITAL: "100000"    # 10 萬台幣零股前導測試（設 0 = 只顯示百分比）
      WIN_RATE: "0.55"           # 策略勝率，累積歷史紀錄後再調整

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'            # 自動快取 requirements.txt，省下每次安裝的 30 秒

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # run_report 現在會同時抓大盤籌碼（三大法人、量能、融資融券、期貨、千張大戶）
      - name: Generate Excel/PDF + market data (DAYS=5)
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          python src/run_report.py

      # v9 AI 分析：prompt 內含大盤籌碼 context
      - name: Gemini analysis (v9 + market context)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: "gemini-2.5-pro"
          GEMINI_TEMPERATURE: "0.3"
          PROMPT_TOP_BROKERS: "7"
          PROMPT_TOP_STOCKS: "7"
          GEMINI_RETRIES: "3"
          GEMINI_RETRY_BASE_SLEEP: "2.0"
          GEMINI_ENABLE_FIXUP: "1"
          PYTHONUNBUFFERED: "1"
        run: |
          python src/ai_analyze_gemini.py

      - name: Verify Gemini analysis (safe)
        run: |
          python - <<'PY'
          import json
          with open("output/summary.json", "r", encoding="utf-8") as f:
              s = json.load(f)
          t = s.get("ai_analysis", "") or ""
          print("ai_model =", s.get("ai_model"))
          print("ai_analyzer_version =", s.get("ai_analyzer_version"))
          print("ai_analysis_chars =", len(t))
          print("ai_analysis_lines =", len(t.splitlines()))

          # 驗證大盤資料是否成功抓取
          md = s.get("market_data", {})
          print(f"market_data: inst={len(md.get('institutional',[]))}, "
                f"taiex={len(md.get('taiex',[]))}, "
                f"margin={len(md.get('margin',[]))}, "
                f"futures={len(md.get('futures',[]))}, "
                f"tdcc={len(md.get('tdcc',[]))}")
          errs = md.get("fetch_errors", [])
          if errs:
              print(f"market fetch_errors: {errs}")

          if "失敗" in t or "error" in t.lower():
              print("⚠️ AI 分析包含錯誤訊息")
          else:
              print("✅ AI 分析正常")
          PY

      - name: Upload artifacts (auto expire)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: foreign-report
          path: |
            output/*.xlsx
            output/*.pdf
            output/summary.json
            output/ai_analysis.txt
            output/debug/*.html
            data/historical_signals.csv
          retention-days: 7
          if-no-files-found: warn

      - name: Build mail subject
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          REPORT_DATE="$(TZ=Asia/Taipei date +'%Y-%m-%d')"
          echo "MAIL_SUBJECT=【外資半量化交易訊號系統分析】${REPORT_DATE}（TW 18:00）${REPO_NAME}" >> $GITHUB_ENV

      - name: Send email
        env:
          SMTP_HOST: "smtp.gmail.com"
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM:  ${{ secrets.MAIL_FROM }}
          MAIL_TO:    ${{ secrets.MAIL_TO }}
          MAIL_BCC:   ${{ secrets.MAIL_BCC }}
          MAIL_SUBJECT: ${{ env.MAIL_SUBJECT }}
        run: |
          python src/mailer.py

      # ✅ 歷史訊號資料庫：每日自動 commit 回 repo，永久累積
      # [skip ci] 避免此 push 再次觸發 workflow（防止無限迴圈）
      # git diff --staged --quiet 防呆：若無新資料（例如假日）則跳過，不產生空 commit
      - name: Commit historical signals DB
        run: |
          git config --local user.name  "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add data/historical_signals.csv || true
          git diff --staged --quiet || (
            REPORT_DATE="$(TZ=Asia/Taipei date +'%Y-%m-%d')"
            git commit -m "📊 歷史訊號DB：${REPORT_DATE} 自動更新 [skip ci]"
            git pull --rebase
            git push
            echo "[OK] historical_signals.csv 已 commit 回 repo"
          )
